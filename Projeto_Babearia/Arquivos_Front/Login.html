<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <title>Document</title>
</head>
   <script src="script.js"></script>
<body>
    
    <header>
        <!--Topo do Site-->
<div class="Logo">
    <img src="icons/3m-barber-logo.png" alt="logo" class="img-logo"> 3M BARBER
</div>

        <nav>
            <a href="#">Início</a>
            <a href="#">Agendamentos</a>
            <a href="#">Cortes</a>
            
        </nav>
        
        <div class="usuario">
  <a href="" class="Login">Login/Cadastro</a>
  <img src="icons/user.png" class="Boneco">
</div>
</header>
<!--principal-->
<main>
<div class="card">
<!--tabelas-->

    <div class="tabs">
    <button class="tab-btn active" id="tabEntrar"   onclick="switchTab('login')">Entrar</button>
      <button class="tab-btn"      id="tabCadastro" onclick="switchTab('cadastro')">Cadastrar-se</button>
    </div>

    <!--login-->
    <div class="panels">

    <div id="form-login" class="form-container active">
        <h2>Entrar</h2>
        <div class="input-group">
            <label>Email</label>
            <div class="input-wrapper">
                <img src="icons/email.png" alt="" class="icon">
                <input type="email" placeholder="E-mail">
            </div>
        </div>
        
        <div class="input-group">
            <label>Senha</label>
            <div class="input-wrapper">
                <img src="icons/lock.png" alt="" class="icon">
                <input type="password" id="pass-login" placeholder="Insira sua senha">
<button class="eye-btn" onclick="toggleOlho('pass-login','eye-open')" type="button" aria-label="Mostrar senha">
    <img id="eye-open" src="icons/visible.png">
</button>
            </div>
        </div>
        <button class="btn-main" onclick="fazerlogin()">ENTRAR</button>
        
        <!--registro-->

    </div>
    <div id="form-register" class="form-container">
        <h2>Cadastro</h2>
        <div class="input-group">
            <label>Nome</label>
            <div class="input-wrapper">
                <img src="icons/username.png" class="icon"> 
                <input type="text" placeholder="Insira seu nome">
            </div>
        </div>

        <div class="input-group">
            <label>E-mail</label>
            <div class="input-wrapper">
                <img src="icons/email.png" class="icon">
                <input type="text" placeholder="Insira seu E-mail">
            </div>
        </div>
        <div class="input-group">
            <label>Senha</label>
            <div class="input-wrapper">
                <img src="icons/lock.png" class="icon">
               <input type="password" id="pass-register" placeholder="Crie uma senha">
<button class="eye-btn" onclick="toggleOlho('pass-register','eye-open2')" type="button" aria-label="Mostrar senha">
    <img id="eye-open2" src="icons/visible.png"></button>
            </div>
        </div>
        <button class="btm-main" onclick="fazercadastro()">CRIAR CONTA</button>
    </div>
    </div>
  </div>
</div>
</main>

<!--popup:Login-->

<div class="overlay" id="overlaylogin">
    <div class="popup">
        <div class="flip-scene">
            <div class="flip-card" id="flipcard">
                <div class="flip-face">
                    <img src="icons/user.png" alt="">
                </div>
            </div>
        </div>
        <p class="popup-title">Bem-Vindo! ✂️</p>
        <p class="popup-sub">Entrando na sua conta, Aguarde...</p>
    </div>
</div>

<!--popup:Registro-->

<div class="overlay" id="overlayregister">
    <div class="popup">
        <div class="spinner">
        </div>
        <p class="popup-title"> Criando Conta</p>
        <p class="popup-sub">Estamos criando sua conta, se tudo der certo, você será redirecionado, Aguarde...</p>
    </div>
</div>



    
</body>
</html>
