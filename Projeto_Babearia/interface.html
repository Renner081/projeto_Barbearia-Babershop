<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <title>interface da Barbearia</title>
</head>

<body>
    <header>
        <!--Topo do Site-->
        <div class="Logo"><img src="logo/3m-barber-logo.png" alt="3M Barber"> 3M BARBER </div>
        <!--Partes em # adiciona Link para outra página do Site-->
        <nav>
            <a href="interface.html">Início</a>
            <a href="#">Agendamentos</a>
            <a href="#">Cortes</a>

        </nav>

        <a href="#" class="Login">Login/Cadastro
            <div class="icon_LG"><img src="icons/user.png" alt="User_icon"></div>
        </a>

    </header>
    <div class="hero">

        <div class="lado-esquerdo">
            <h1>Bem-vindo à 3M Barber</h1>
            <h2>Escolha seu Estilo </h2>
            <p class="subtitulo">Na 3M Barber, oferecemos cortes de cabelo que combinam estilo, tecnica e precisão.
                escolha o corte que combina
                mais com você.
            </p>
            <button class="butão_agdt"><b>AGENDAR HORÁRIO</b></button>
        </div>


        <div class="carousel">


            <!-- Aqui ficam as imagens do carrossel -->
            <div class="slides" id="track">
                <div class="slide ativo"><img src="img/barber.png" alt="img 1"></div>
                <div class="slide"><img src="img/classic-cut.png" alt="img 2"></div>
                <div class="slide"><img src="img/fade-cut.png" alt="img 3"></div>
            </div>

            <!-- Botões de navegação -->
            <button class="arrow prev" id="prev">&#8592;</button>
            <button class="arrow next" id="next">&#8594;</button>

            <!-- Container das bolinhas, preenchido pelo JS -->
            <div class="dots" id="dots"></div>

        </div>
    </div>
    <script src="carousel.js"></script>


</body font-family="Montserrat">

</html>
