<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3M Barber</title>

    <link rel="stylesheet" href="Style.css">
</head>

<body>

<header>
    <div class="Logo">
        <img src="logo/3m-barber-logo.png" alt="Logo">
        <span>3M BARBER</span>
    </div>

    <nav>
        <a href="#">Início</a>
        <a href="#">Agendamentos</a>
        <a href="#">Cortes</a>
    </nav>

    <a href="#" class="Login">
        <span>Login/Cadastro</span>
        <img src="icons/user.png" alt="Usuário">
    </a>
</header>

<section class="hero">

  <div class="lado-esquerdo">
    <h1>Bem-vindo à 3M Barber</h1>
    <h2>Estilo, precisão e atendimento<br>de qualidade em cada detalhe.</h2>

    <p class="subtitulo">
      Aqui cada corte é feito com técnica,<br>
      cuidado e atenção ao seu estilo.<br>
      Nossa equipe oferece cortes modernos,<br>
      barba bem definida e uma experiência única.
    </p>

    <button class="butao_agdt">AGENDAR HORÁRIO</button>
  </div>

    <div class="carousel">

        <div class="slide ativo">
            <img src="img/barber.png">
        </div>

        <div class="slide">
            <img src="img/classic-cut.png">
        </div>

        <div class="slide">
            <img src="img/fade-cut.png">
        </div>

        <button class="arrow prev">&#8592;</button>
        <button class="arrow next">&#8594;</button>

        <div class="dots"></div>

    </div>

</section>

<script src="carousel.js"></script>

</body>
</html>
