<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="scripts/Style_LoginRegistro.css">
    <title>Document</title>
</head>

<body>

    <script src="scripts/Script_LoginRegistro.js"></script>

    <header>

        <!-- Topo -->
        <div class="Logo">
            <img src="img/3m-barber-logo.png" alt="logo" class="img-logo">
            3M BARBER
        </div>

        <nav>
            <a href="inicio.html">Início</a>
            <a href="Agendamento.html">Agendamentos</a>
            <a href="Cortes.html">Cortes</a>
        </nav>

          <div class="Login">
            <a href="Login_Registro.html" class="Login_text">Login/Cadastro</a>

            <a href="#" class="icon_LG">
                <img src="icons/user.png" alt="User_icon">
            </a>
        </div>

    </header>


    <!-- Principal -->
    <main>

        <div class="card">

            <!-- Tabs -->
            <div class="tabs">

                <button class="tab-btn active" id="tabEntrar" onclick="switchTab('login')">
                    Entrar
                </button>

                <button class="tab-btn" id="tabCadastro" onclick="switchTab('cadastro')">
                    Cadastrar-se
                </button>

            </div>


            <!-- Forms -->
            <div class="panels">

                <!-- LOGIN -->
                <div id="form-login" class="form-container active">

                    <h2>Entrar</h2>

                    <div class="input-group">
                        <label>Email</label>

                        <div class="input-wrapper">
                            <img src="icons/email.png" class="icon">
                            <input type="email" placeholder="E-mail">
                        </div>
                    </div>


                    <div class="input-group">
                        <label>Senha</label>

                        <div class="input-wrapper">
                            <img src="icons/lock.png" class="icon">

                            <input type="password" id="pass-login" placeholder="Insira sua senha">

                            <button class="eye-btn" onclick="toggleOlho('pass-login','eye-open')" type="button"
                                aria-label="Mostrar senha">

                                <img id="eye-open" src="icons/visible.png">

                            </button>
                        </div>
                    </div>

                    <button class="btn-main" onclick="fazerlogin()">
                        ENTRAR
                    </button>

                </div>


                <!-- CADASTRO -->
                <div id="form-register" class="form-container">

                    <h2>Cadastro</h2>

                    <div class="input-group">
                        <label>Nome</label>

                        <div class="input-wrapper">
                            <img src="icons/username.png" class="icon">
                            <input type="text" placeholder="Insira seu nome">
                        </div>
                    </div>


                    <div class="input-group">
                        <label>E-mail</label>

                        <div class="input-wrapper">
                            <img src="icons/email.png" class="icon">
                            <input type="text" placeholder="Insira seu E-mail">
                        </div>
                    </div>


                    <div class="input-group">
                        <label>Senha</label>

                        <div class="input-wrapper">
                            <img src="icons/lock.png" class="icon">

                            <input type="password" id="pass-register" placeholder="Crie uma senha">

                            <button class="eye-btn" onclick="toggleOlho('pass-register','eye-open2')" type="button"
                                aria-label="Mostrar senha">

                                <img id="eye-open2" src="icons/visible.png">

                            </button>
                        </div>
                    </div>

                    <button class="btm-main" onclick="fazercadastro()">
                        CRIAR CONTA
                    </button>

                </div>

            </div>

        </div>

    </main>


    <!-- Popup Login -->
    <div class="overlay" id="overlaylogin">

        <div class="popup">

            <div class="flip-scene">
                <div class="flip-card" id="flipcard">

                    <div class="flip-face">
                        <img src="icons/user.png" alt="">
                    </div>

                </div>
            </div>

            <p class="popup-title">Bem-Vindo! ✂️</p>
            <p class="popup-sub">
                Entrando na sua conta, Aguarde...
            </p>

        </div>

    </div>


    <!-- Popup Registro -->
    <div class="overlay" id="overlayregister">

        <div class="popup">

            <div class="spinner"></div>

            <p class="popup-title">Criando Conta</p>

            <p class="popup-sub">
                Estamos criando sua conta, se tudo der certo,
                você será redirecionado, Aguarde...
            </p>

        </div>

    </div>

</body>

</html>
